[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "sidelinehd-extractor"
version = "0.1.0"
description = "Local SidelineHD overlay OCR and YouTube timestamp exporter"
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
    "opencv-python>=4.9",
    "yt-dlp>=2025.1",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "ruff>=0.4",
]

[project.scripts]
sidelinehd-extractor = "sidelinehd_extractor.cli:main"

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py39"
