<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SidelineHD Extractor</title>
  <script src="/static/htmx.min.js"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
           max-width: 52rem; margin: 2rem auto; padding: 0 1rem; color: #1a1a1a; }
    h1 { font-size: 1.4rem; }
    form.submit-form { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center;
                       margin-bottom: 0.75rem; }
    form.submit-form input[type="url"] { flex: 1 1 22rem; padding: 0.45rem 0.6rem;
                                         border: 1px solid #bbb; border-radius: 4px; }
    form.submit-form select, form.submit-form button { padding: 0.45rem 0.7rem;
                                                       border-radius: 4px; }
    #form-error { color: #a3131f; min-height: 1.2rem; margin-bottom: 1rem; }
    ul.job-list { list-style: none; padding: 0; }
    ul.job-list li { border: 1px solid #ddd; border-radius: 6px; padding: 0.6rem 0.8rem;
                     margin-bottom: 0.5rem; }
    .job-url { font-family: ui-monospace, Menlo, monospace; font-size: 0.85rem;
               word-break: break-all; }
    .job-kind { color: #555; font-size: 0.8rem; text-transform: uppercase;
                letter-spacing: 0.04em; margin-right: 0.5rem; }
    .status-badge { display: inline-block; font-size: 0.8rem; padding: 0.1rem 0.5rem;
                    border-radius: 999px; border: 1px solid transparent; }
    .status-queued { background: #f0f0f0; color: #444; }
    .status-running { background: #e5f0ff; color: #1447a3; }
    .status-done { background: #e4f7e6; color: #1a6e2a; }
    .status-error { background: #fdeaea; color: #a3131f; }
    .current-stage { color: #555; font-size: 0.85rem; margin-left: 0.5rem; }
    .job-warnings { color: #8a5a00; font-size: 0.85rem; margin: 0.3rem 0 0; padding-left: 1.2rem; }
    .job-error { color: #a3131f; font-size: 0.85rem; margin-top: 0.3rem; }
    .health-banner { background: #fdeaea; border: 2px solid #a3131f; color: #a3131f;
                     border-radius: 8px; padding: 0.6rem 0.8rem; margin: 0.4rem 0;
                     font-weight: 700; }
    a { color: #1447a3; }
    pre { background: #f6f6f6; padding: 0.7rem; border-radius: 6px; overflow-x: auto;
          font-size: 0.8rem; }
  </style>
</head>
<body>
  <h1>SidelineHD Extractor</h1>
  <p><a href="/rosters">Manage rosters</a></p>

  <form class="submit-form" hx-post="/jobs" hx-target="#job-list" hx-swap="afterbegin">
    <input type="url" name="url" placeholder="YouTube video or playlist URL" autofocus>
    <select name="kind">
      <option value="single">Single video</option>
      <option value="playlist">Playlist</option>
    </select>
    <button type="submit">Run</button>
  </form>
  <div id="form-error"></div>

  <h2>Jobs</h2>
  <ul id="job-list" class="job-list">
    {% for job in jobs %}{% include "_job_row.html" %}{% endfor %}
  </ul>

  <script>
    // HTMX does not swap non-2xx responses by default; surface the 400
    // validation partial in the error slot instead.
    document.body.addEventListener("htmx:responseError", function (evt) {
      document.getElementById("form-error").innerHTML = evt.detail.xhr.responseText;
    });
    // CR-51: only a successful submit clears the error slot — the 1s status
    // polls must not wipe a just-shown validation message.
    document.body.addEventListener("htmx:afterRequest", function (evt) {
      if (evt.detail.successful && evt.detail.requestConfig.path === "/jobs") {
        document.getElementById("form-error").innerHTML = "";
      }
    });
  </script>
</body>
</html>
