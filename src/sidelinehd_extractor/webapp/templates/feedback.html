<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Feedback {{ job.id[:8] }} - SidelineHD Extractor</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
           max-width: 72rem; margin: 2rem auto; padding: 0 1rem; color: #1a1a1a; }
    h1 { font-size: 1.3rem; }
    h2 { font-size: 1.05rem; }
    a { color: #1447a3; }
    .job-url { font-family: ui-monospace, Menlo, monospace; font-size: 0.85rem;
               word-break: break-all; }
    .job-kind { color: #555; font-size: 0.8rem; text-transform: uppercase;
                letter-spacing: 0.04em; margin-right: 0.5rem; }
    .feedback-layout { display: grid; grid-template-columns: minmax(0, 1fr) 18rem;
                       gap: 1rem; align-items: start; }
    .panel { border: 1px solid #cfd7df; border-radius: 8px; padding: 1rem;
             background: #ffffff; }
    .panel h2 { margin-top: 0; }
    label { display: block; font-weight: 700; margin-bottom: 0.35rem; }
    textarea { width: 100%; box-sizing: border-box; border: 1px solid #cfd7df;
               border-radius: 6px; padding: 0.7rem; resize: vertical;
               font: 0.9rem/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    textarea[name="note"] { min-height: 7rem; font-family: inherit; }
    .feedback-body { min-height: 32rem; background: #fbfcfd; white-space: pre; }
    button, .button-link { display: inline-flex; align-items: center; justify-content: center;
                           min-height: 2.4rem; border-radius: 6px; padding: 0 0.8rem;
                           border: 1px solid #0969da; background: #0969da; color: #ffffff;
                           font-weight: 700; text-decoration: none; cursor: pointer; }
    .button-link.secondary, button.secondary { border-color: #cfd7df; background: #f6f8fa;
                                               color: #24292f; }
    .actions { display: grid; gap: 0.6rem; }
    .status { min-height: 1.3em; color: #1a7f37; font-size: 0.9rem; }
    .pending { color: #555; }
    @media (max-width: 820px) { .feedback-layout { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <p>
    <a href="/">&larr; All jobs</a> |
    <a href="/jobs/{{ job.id }}">Job detail</a> |
    <a href="/jobs/{{ job.id }}/results">Results</a>
  </p>
  <h1>Send feedback
    <span class="job-kind">{{ job.kind }}</span>
    <span class="job-url">{{ job.url }}</span>
  </h1>

  {% if pending %}
    <p class="pending">This job is not finished yet (status: {{ job.status }}).
       Follow its progress on the <a href="/jobs/{{ job.id }}">job detail page</a>.</p>
  {% else %}
    <div class="feedback-layout">
      <main class="panel">
        <h2>Preview</h2>
        <textarea id="feedback-body" class="feedback-body" readonly>{{ markdown }}</textarea>
      </main>

      <aside class="panel">
        <h2>Note</h2>
        <form method="post" action="/jobs/{{ job.id }}/feedback/preview">
          <input type="hidden" name="entry" value="{{ entry }}">
          <label for="feedback-note">Add context</label>
          <textarea id="feedback-note" name="note">{{ note }}</textarea>
          <p><button type="submit">Update preview</button></p>
        </form>

        <h2>Hand off</h2>
        <div class="actions">
          <a class="button-link" href="{{ github_issue_url }}" target="_blank" rel="noopener">
            Open GitHub issue
          </a>
          <a class="button-link secondary" href="{{ mailto_url }}">Open email</a>
          <button class="secondary" type="button" data-copy-feedback>Copy for email</button>
          <div id="copy-status" class="status" aria-live="polite"></div>
        </div>
      </aside>
    </div>

    <script>
      document.querySelector("[data-copy-feedback]").addEventListener("click", async function () {
        var status = document.getElementById("copy-status");
        var body = document.getElementById("feedback-body").value;
        try {
          await navigator.clipboard.writeText(body);
          status.textContent = "Copied.";
        } catch (err) {
          status.textContent = "Select the preview text and copy it manually.";
        }
      });
    </script>
  {% endif %}
</body>
</html>
