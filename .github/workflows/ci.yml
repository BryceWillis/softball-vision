# Item 19: cross-platform CI. The web extra is installed alongside dev because
# the webapp test modules import fastapi/uvicorn at module scope.
# Tests run under pytest (in the dev extra): the suite mixes unittest.TestCase
# classes with pytest fixture/function-style tests, so `unittest discover` would
# silently run only ~379 of 498 and skip the entire web-app surface — a false
# green. (Reviewer-corrected from the original item-19 design's unittest step.)
name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        # Oldest supported (requires-python >=3.10) and current stable.
        python-version: ["3.10", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package with dev and web extras
        run: python -m pip install -e ".[dev,web]"
      - name: Run tests
        run: python -m pytest tests/
      - name: Lint
        run: python -m ruff check .
